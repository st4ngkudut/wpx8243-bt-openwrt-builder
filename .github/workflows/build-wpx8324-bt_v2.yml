name: 'Build OpenWrt WPX8324-BT v2'

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi/Branch OpenWrt'
        required: true
        type: choice
        default: 'v25.12.5'
        options:
          - 'snapshot'
          - 'v25.12.5'
          - 'v25.12.4'
      custom_packages:
        description: 'Daftar Paket Tambahan (Gunakan tanda minus "-" untuk menghapus paket)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Checkout Kode Repositori
        uses: actions/checkout@v4

      - name: 2. Siapkan Variabel Build & Ambil Vermagic
        id: build_vars
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          VERSION_NUM=$(echo "$VERSION" | sed 's/^v//')
          
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
          
          if [[ "$VERSION" != "snapshot" ]]; then
            KMODS_URL="https://downloads.openwrt.org/releases/${VERSION_NUM}/targets/qualcommax/ipq50xx/kmods/"
            PACKAGES_URL="https://downloads.openwrt.org/releases/${VERSION_NUM}/targets/qualcommax/ipq50xx/packages/Packages"
          else
            KMODS_URL="https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq50xx/kmods/"
            PACKAGES_URL="https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq50xx/packages/Packages"
          fi
          
          FULL_KERNEL_VER=$(curl -sL "$KMODS_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+-[a-f0-9]{32}' | head -n 1)
          
          if [[ -z "$FULL_KERNEL_VER" ]]; then
            FULL_KERNEL_VER=$(curl -sL "$PACKAGES_URL" | awk '/^Package: kernel$/{f=1} f && /^Version:/{print $2; exit}')
          fi
          
          if [[ -z "$FULL_KERNEL_VER" ]]; then
            echo "::error::Gagal mengambil informasi kernel dari server OpenWrt."
            exit 1
          fi
          
          VERMAGIC=$(echo "$FULL_KERNEL_VER" | awk -F'-' '{print $NF}')
          KERNEL_BASE=$(echo "$FULL_KERNEL_VER" | cut -d'-' -f1)
          KERNEL_MAJOR_MINOR=$(echo "$KERNEL_BASE" | cut -d'.' -f1,2)
          KERNEL_CONFIG="config-${KERNEL_MAJOR_MINOR}"
          
          echo "vermagic=$VERMAGIC" >> $GITHUB_OUTPUT
          echo "kernel_config=$KERNEL_CONFIG" >> $GITHUB_OUTPUT
          echo "full_kernel_ver=$FULL_KERNEL_VER" >> $GITHUB_OUTPUT
          echo "kmods_url=$KMODS_URL" >> $GITHUB_OUTPUT

      - name: 3. Kosongkan Ruang Disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
          sudo apt-get clean
          df -h

      - name: 4. Instal Dependensi Build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3-setuptools rsync unzip \
            zlib1g-dev file wget ccache curl

      - name: 5. Clone Repositori OpenWrt
        run: git clone https://github.com/openwrt/openwrt.git ./openwrt

      - name: 6. Atur Cache Build (Nuke Cache v118)
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/.ccache
          key: ${{ runner.os }}-openwrt-qualcommax-${{ github.event.inputs.openwrt_version }}-v118
          restore-keys: |
            ${{ runner.os }}-openwrt-qualcommax-${{ github.event.inputs.openwrt_version }}-v118-

      - name: 7. Injeksi Kode (Jalur Mandiri File Lokal)
        working-directory: ./openwrt
        run: |
          echo "BUILD_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          
          git checkout ${{ github.event.inputs.openwrt_version }}
          
          mkdir -p target/linux/qualcommax/files/arch/arm64/boot/dts/qcom/
          mkdir -p files/etc/hotplug.d/firmware/
          
          cp $GITHUB_WORKSPACE/custom-files/ipq5018-wpx8324.dts target/linux/qualcommax/files/arch/arm64/boot/dts/qcom/
          
          cat << EOF >> target/linux/qualcommax/image/ipq50xx.mk

          define Device/wpx8324_ap-mp03-5-c1
            \$(call Device/FitImageLzma)
            \$(call Device/UbiFit)
            DEVICE_VENDOR := Lite-On
            DEVICE_MODEL := WPX8324
            DEVICE_DTS := ipq5018-wpx8324
            DEVICE_DTS_CONFIG := config@mp03.5-c1
            SOC := ipq5018
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            IMAGE_SIZE := 59392k
            NAND_SIZE := 128m
            DEVICE_PACKAGES := ath11k-firmware-ipq5018 ath11k-firmware-ipq5018-qcn6122 ipq-wifi-yuncore_ax830 kmod-ath11k-pci kmod-usb-dwc3-qcom kmod-usb-storage kmod-fs-vfat block-mount usbutils ${{ github.event.inputs.custom_packages }}
          endef
          TARGET_DEVICES += wpx8324_ap-mp03-5-c1
          EOF

          sed -i 's/yuncore,ax830|\\/wpx8324,ap-mp03-5-c1|\\\n\tyuncore,ax830|\\/g' target/linux/qualcommax/ipq50xx/base-files/lib/upgrade/platform.sh
          sed -i 's/yuncore,ax850)/wpx8324,ap-mp03-5-c1)\n\t\tucidef_set_interfaces_lan_wan "lan" "wan"\n\t\t;;\n\tyuncore,ax850)/g' target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network
          sed -i 's/yuncore,ax830|\\/wpx8324,ap-mp03-5-c1|\\\n\tyuncore,ax830|\\/g' package/boot/uboot-tools/uboot-envtools/files/qualcommax_ipq50xx
          
          for i in 1 2 3; do
            ./scripts/feeds update -a && break || sleep 60
          done
          ./scripts/feeds install -a

      - name: 8. Terapkan Vermagic Kernel (Paranoia Mode)
        working-directory: ./openwrt
        run: |
          echo -n "${{ steps.build_vars.outputs.vermagic }}" > .vermagic
          
          sed -i 's/.*grep '\''=\[ym\]'\'' $(LINUX_DIR)\/.config\.set.*/\tcp $(TOPDIR)\/.vermagic $(LINUX_DIR)\/.vermagic/g' include/kernel-defaults.mk
          
          if ! grep -q "cp \$(TOPDIR)/.vermagic \$(LINUX_DIR)/.vermagic" include/kernel-defaults.mk; then
            echo "::error::Injeksi include/kernel-defaults.mk GAGAL!"
            exit 1
          fi
          
          sed -i 's/.*kconfig\.pl $(LINUX_DIR)\/.config.*/STAMP_BUILT:=$(STAMP_BUILT)_$(shell cat $(LINUX_DIR)\/.vermagic)/g' package/kernel/linux/Makefile
          
          if ! grep -q "shell cat \$(LINUX_DIR)/.vermagic" package/kernel/linux/Makefile; then
            echo "::error::Injeksi package/kernel/linux/Makefile GAGAL!"
            exit 1
          fi
          
          mkdir -p files/etc/apk/repositories.d/
          mkdir -p files/etc/opkg/
          echo "${{ steps.build_vars.outputs.kmods_url }}${{ steps.build_vars.outputs.full_kernel_ver }}" > files/etc/apk/repositories.d/official-kmods.list
          echo "src/gz openwrt_kmods ${{ steps.build_vars.outputs.kmods_url }}${{ steps.build_vars.outputs.full_kernel_ver }}" > files/etc/opkg/customfeeds.conf

      - name: 9. Konfigurasi First Boot (uci-defaults)
        working-directory: ./openwrt
        run: |
          mkdir -p files/etc/uci-defaults
          cat << 'EOF' > files/etc/uci-defaults/99-custom-settings
          #!/bin/sh
          uci set system.@system[0].timezone='WIB-7'
          uci set system.@system[0].zonename='Asia/Jakarta'
          uci set system.@system[0].hostname='WPX8324-BT'
          uci commit system
          
          rm -f /etc/config/wireless
          wifi config
          
          uci set wireless.default_radio0.ssid='WPX8324-BT'
          uci set wireless.radio0.country='ID'
          uci set wireless.radio0.disabled='0'
          uci set wireless.radio0.channel='auto'
          
          if uci get wireless.radio1 > /dev/null 2>&1; then
            uci set wireless.default_radio1.ssid='WPX8324-BT 5G'
            uci set wireless.radio1.country='ID'
            uci set wireless.radio1.disabled='0'
            uci set wireless.radio1.channel='157'
          fi
          uci commit wireless
          
          sed -i -e '/12d1:15c1/,+5d' /etc/usb-mode.json
          sed -i -e '/413c:81d7/,+5d' /etc/usb-mode.json
          wifi reload
          wifi up
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-custom-settings

      - name: 10. Terapkan Konfigurasi Kustom & Blueprint Resmi
        working-directory: ./openwrt
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          VERSION_NUM=$(echo "$VERSION" | sed 's/^v//')
          
          if [[ "$VERSION" != "snapshot" ]]; then
            wget "https://downloads.openwrt.org/releases/${VERSION_NUM}/targets/qualcommax/ipq50xx/config.buildinfo" -O .config
          else
            wget "https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq50xx/config.buildinfo" -O .config
          fi
          
          sed -i '/CONFIG_TARGET_DEVICE_/d' .config
          sed -i '/CONFIG_TARGET_ALL_PROFILES/d' .config
          sed -i '/CONFIG_ALL_KMODS/d' .config
          sed -i '/CONFIG_ALL_NONSHARED/d' .config
          sed -i '/CONFIG_BUILDBOT/d' .config
          sed -i '/CONFIG_IB/d' .config
          sed -i '/CONFIG_SDK/d' .config
          sed -i '/CONFIG_MAKE_TOOLCHAIN/d' .config
          sed -i '/CONFIG_JSON_CYCLONEDX_SBOM/d' .config
          
          echo 'CONFIG_CCACHE=y' >> .config
          echo 'CONFIG_TARGET_DEVICE_qualcommax_ipq50xx_DEVICE_wpx8324_ap-mp03-5-c1=y' >> .config
          
          MANDATORY_PKGS="luci luci-ssl kmod-mii kmod-usb-net kmod-usb-wdm kmod-usb-net-qmi-wwan uqmi luci-proto-qmi kmod-usb-net-cdc-ether kmod-usb-serial-option kmod-usb-serial kmod-usb-serial-wwan qmi-utils kmod-usb-serial-qualcomm kmod-usb-acm kmod-usb-net-cdc-ncm kmod-usb-net-cdc-mbim umbim modemmanager luci-proto-modemmanager usbutils iperf3 usb-modeswitch kmod-usb-net-rndis nano htop pv openssh-sftp-server"
          EXTRA_PKGS="${{ github.event.inputs.custom_packages }}"
          ALL_PKGS="$MANDATORY_PKGS $EXTRA_PKGS"
          
          if [ -n "$ALL_PKGS" ]; then
            for pkg in $ALL_PKGS; do
              if [[ $pkg == -* ]]; then
                clean_pkg="${pkg#-}"
                echo "# CONFIG_PACKAGE_$clean_pkg is not set" >> .config
              else
                echo "CONFIG_PACKAGE_$pkg=y" >> .config
              fi
            done
          fi
          
          sort -u .config -o .config
          make defconfig

      - name: 11. Mulai Proses Build
        working-directory: ./
        env:
          CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
          USE_CCACHE: 1
        run: |
          make -j$(nproc) -C openwrt download
          make -j$(nproc) -C openwrt world

      - name: 12. Unggah Artefak Build
        uses: actions/upload-artifact@v4
        with:
          name: WPX8324-Firmware-${{ github.event.inputs.openwrt_version }}-${{ env.BUILD_DATE }}
          path: ./openwrt/bin/targets/qualcommax/ipq50xx/*wpx8324*

      - name: 13. Kumpulkan Berkas untuk Rilis
        run: |
          mkdir -p ./release_files
          find ./openwrt/bin/targets/qualcommax/ipq50xx/ -type f -name "*wpx8324*" -exec cp {} ./release_files/ \; 2>/dev/null || true

      - name: 14. Kirim Berkas ke GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "OpenWrt WPX8324 (IPQ50xx) ${{ github.event.inputs.openwrt_version }} (${{ env.BUILD_DATE }})"
          tag: "${{ github.event.inputs.openwrt_version }}-${{ env.BUILD_DATE }}"
          artifacts: "./release_files/*"
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
